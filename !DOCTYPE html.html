<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trail Analytics Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0e; --bg2:#0d1017; --card:#111318; --card2:#171b22; --card3:#1c2029;
  --text:#e8eaf0; --muted:#4a5568; --muted2:#8892a4;
  --accent:#3b82f6; --accent-light:#60a5fa; --danger:#ef4444; --success:#22c55e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--card2);
}

.logo { font-weight: 700; font-size: 1.5rem; color: var(--accent-light); }

.config-panel {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid var(--card3);
}

.input-group {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

input {
  background: var(--bg2);
  border: 1px solid var(--card3);
  color: white;
  padding: 12px;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
}

button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

#status-msg { margin-top: 15px; font-size: 0.9rem; padding: 10px; border-radius: 6px; display: none; white-space: pre-wrap; word-break: break-word; }
.error { display: block !important; background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
.success { display: block !important; background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }

.activity-item {
  background: var(--card);
  margin-bottom: 10px;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--card3);
}

.stat-card {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid var(--card3);
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">TRAIL ANALYTICS PRO</div>
  </header>

  <div class="config-panel">
    <h3>Conectar con Intervals.icu</h3>
    <p style="font-size: 0.85rem; color: var(--muted2); margin-bottom: 15px;">
        Si los proxies públicos fallan, intenta desactivar extensiones de AdBlock o navegar en modo Incógnito.<br>
        <strong>Usa tu Athlete ID numérico y la API Key de Ajustes > Desarrollador.</strong>
    </p>
    <div class="input-group">
      <input type="text" id="athlete-id" placeholder="ID Atleta (ej: 123456)">
      <input type="password" id="api-key" placeholder="API Key">
      <button id="btn-load" onclick="fetchActivities()">Cargar Datos</button>
    </div>
    <div id="status-msg"></div>
  </div>

  <div id="summary" style="display: none;">
    <div class="stat-card">
        <h4 id="summary-text"></h4>
    </div>
    <div id="activities-list"></div>
  </div>
</div>

<script>
function showStatus(msg, isError = false) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = isError ? 'error' : 'success';
}

async function fetchActivities() {
    let aid = document.getElementById('athlete-id').value.trim().replace(/\D/g, '');
    const key = document.getElementById('api-key').value.trim();
    const btn = document.getElementById('btn-load');

    if (!aid || !key) {
        showStatus("Faltan credenciales", true);
        return;
    }

    btn.disabled = true;
    btn.textContent = "Conectando...";
    showStatus("Solicitando datos a Intervals.icu...");

    const now = new Date();
    const past = new Date();
    past.setDate(now.getDate() - 30);
    const oldest = past.toISOString().split('T')[0];

    const targetUrl = `https://intervals.icu/api/v1/athlete/${aid}/activities?oldest=${oldest}`;
    const authHeader = 'Basic ' + btoa(`API_KEY:${key}`);

    try {
        // Intentamos con AllOrigins primero pero con un bloque try-catch interno más específico
        let data = await tryFetchWithProxy(targetUrl, authHeader);
        
        if (data && Array.isArray(data)) {
            renderActivities(data);
            showStatus("¡Datos cargados con éxito!", false);
        } else {
            throw new Error("No se pudieron procesar los datos. Verifica tu ID y API Key.");
        }

    } catch (err) {
        console.error("Error final:", err);
        showStatus("Error: " + err.message + "\n\nTip: Algunos proxies bloquean peticiones desde ciertos dominios. Prueba a subir este archivo a un servidor web o GitHub Pages.", true);
    } finally {
        btn.disabled = false;
        btn.textContent = "Cargar Datos";
    }
}

async function tryFetchWithProxy(target, auth) {
    // Usamos AllOrigins como proxy principal, es el más estable para entornos de cliente puro
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
    
    try {
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error("Fallo de red en el servidor Proxy.");
        
        const json = await res.json();
        if (!json.contents) throw new Error("El proxy no devolvió contenido.");

        // AllOrigins devuelve el contenido como string, hay que parsearlo
        const content = JSON.parse(json.contents);
        
        // Si Intervals devolvió un objeto de error (como un 401/403) suele venir dentro
        if (content.status && (content.status === 401 || content.status === 403)) {
            throw new Error("Acceso denegado por Intervals.icu. Revisa tu API Key.");
        }
        
        if (content.error) {
            throw new Error("Intervals API: " + content.error);
        }

        return content;
    } catch (e) {
        console.error("Error en tryFetchWithProxy:", e);
        throw e;
    }
}

function renderActivities(list) {
    const container = document.getElementById('activities-list');
    const summary = document.getElementById('summary');
    container.innerHTML = "";
    summary.style.display = "block";
    
    document.getElementById('summary-text').textContent = `Encontradas ${list.length} actividades (Últimos 30 días)`;

    list.sort((a,b) => new Date(b.start_date_local) - new Date(a.start_date_local));

    list.forEach(act => {
        const div = document.createElement('div');
        div.className = 'activity-item';
        const dist = act.distance ? (act.distance/1000).toFixed(2) : "0.00";
        div.innerHTML = `
            <div>
                <strong>${act.name || 'Sin nombre'}</strong><br>
                <small style="color:var(--muted2)">${new Date(act.start_date_local).toLocaleDateString()} · ${act.type}</small>
            </div>
            <div style="text-align:right">
                <div>${dist} km</div>
                <small style="color:var(--accent)">${act.icu_training_load || 0} Load</small>
            </div>
        `;
        container.appendChild(div);
    });
}
</script>
</body>
</html>
